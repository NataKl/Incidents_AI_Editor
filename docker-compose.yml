# AI Editor — docker compose
#
# Основные сервисы:
#   - nginx   — веб, обратный прокси; единая точка входа для UI/API (см. location → app, когда появится бэкенд)
#   - db      — PostgreSQL (доступ только внутри сети compose, порт 5432 наружу не публикуем)
#   - pgadmin — веб-интерфейс к БД (см. PGADMIN_PORT в .env; подключение к серверу: Host=db)
#
# Бэкенд FastAPI: сервис app (порт 8000 только внутри сети; снаружи — через nginx /api/).
#
# Дополнительно (по вашей инфраструктуре):
#   - registry  — private Docker Registry для образов
#   - watchtower — обновление контейнеров по новым тегам

name: ai_editor

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: ai-editor-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/html:/usr/share/nginx/html:ro
    networks:
      - ai_editor
    depends_on:
      - app

  app:
    build: ./backend
    container_name: ai-editor-app
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      - ./tests_data:/app/tests_data:rw
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_TEMPERATURE: ${OPENAI_TEMPERATURE:-0.2}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      HTTP_PROXY: ${HTTP_PROXY:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ai_editor

  db:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    container_name: ai-editor-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_INITDB_ARGS: ${POSTGRES_INITDB_ARGS:-}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ai_editor
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    # Порт 5432 наружу не публикуем — БД только для сервисов в сети ai_editor

  pgadmin:
    image: dpage/pgadmin4:${PGADMIN_IMAGE_TAG:-8}
    container_name: ai-editor-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "True"
      # 0 = не блокировать учётку после неверного пароля (для среды разработки; в проде поставьте 5–10)
      PGADMIN_CONFIG_MAX_LOGIN_ATTEMPTS: ${PGADMIN_MAX_LOGIN_ATTEMPTS:-0}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ai_editor
    # Register Server: Host = db (имя сервиса БД в compose; не «postgres»). Maintenance DB = БД из POSTGRES_DB.

  watchtower:
    image: nickfedor/watchtower:latest
    container_name: ai-editor-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_INCLUDE_RESTARTING: "true"
      WATCHTOWER_ROLLING_RESTART: "true"
      WATCHTOWER_STOP_TIMEOUT: ${WATCHTOWER_STOP_TIMEOUT:-30s}
    networks:
      - ai_editor

  registry:
    image: registry:2.8
    container_name: ai-editor-registry
    restart: unless-stopped
    labels:
      com.ai-editor.htpasswd-user: ${REGISTRY_USER:-registryuser}
    ports:
      - "${REGISTRY_PORT:-5000}:5000"
    environment:
      REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY: /var/lib/registry
      REGISTRY_AUTH: htpasswd
      REGISTRY_AUTH_HTPASSWD_PATH: /auth/htpasswd
      REGISTRY_AUTH_HTPASSWD_REALM: ${REGISTRY_AUTH_REALM:-AI Editor Docker Registry}
    volumes:
      - registry_data:/var/lib/registry
      - ./registry/auth/htpasswd:/auth/htpasswd:ro
    networks:
      - ai_editor

volumes:
  postgres_data:
  pgadmin_data:
  registry_data:

networks:
  ai_editor:
    name: ai_editor
    driver: bridge
